<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>Barle · 영업 관리</title>
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <script>
      (function () {
        window.APP_BUILD = "2026-07-09-v59";
        window.ASSET_V = window.APP_BUILD;
        var key = "barle-app-build";
        var saved = localStorage.getItem(key);
        var buildChanged = saved !== window.APP_BUILD;

        if (buildChanged) {
          window.ASSET_V = String(Date.now());
          try {
            localStorage.setItem(key, window.APP_BUILD);
            if ("caches" in window) {
              caches.keys().then(function (names) {
                names.forEach(function (name) {
                  caches.delete(name);
                });
              });
            }
          } catch (_) {}
          var url = new URL(location.href);
          if (url.searchParams.get("build") !== window.APP_BUILD) {
            url.searchParams.set("build", window.APP_BUILD);
            url.searchParams.set("_", window.ASSET_V);
            location.replace(url.toString());
            return;
          }
        }

        var style = document.createElement("link");
        style.rel = "stylesheet";
        style.id = "app-stylesheet";
        style.href = "css/styles.css?v=" + encodeURIComponent(window.ASSET_V);
        document.head.appendChild(style);
      })();
    </script>
  </head>
  <body>
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-logo sidebar-logo-btn" id="btn-sidebar-home" role="button" tabindex="0" aria-label="홈으로">
        <div class="logo-mark">Barle</div>
        <div>
          <h1>영업 관리</h1>
          <span>barle.co.kr</span>
        </div>
      </div>

      <nav class="sidebar-nav">
        <div class="nav-section nav-section-home">
          <button class="nav-item nav-item-home" data-view="dashboard">
            <span class="nav-icon">🏠</span>
            <span class="nav-text">
              <strong>홈</strong>
              <small>업무 바로가기 · 요약</small>
            </span>
          </button>
        </div>

        <div class="nav-section nav-section-main">
          <p class="nav-section-label">메인 업무</p>
          <button class="nav-item nav-item-main" data-view="proposal">
            <span class="nav-icon">📋</span>
            <span class="nav-text">
              <strong>단가표 만들기</strong>
              <small>바이어용 가격표 · 견적</small>
            </span>
          </button>
          <button class="nav-item nav-item-main" data-view="poupload">
            <span class="nav-icon">🧾</span>
            <span class="nav-text">
              <strong>발주서 등록</strong>
              <small>수기·파일 업로드 → 매출 반영</small>
            </span>
          </button>
        </div>

        <div class="nav-section nav-section-sub">
          <p class="nav-section-label">업무 조회</p>
          <button class="nav-item" data-view="history">
            <span class="nav-icon">🕐</span>
            <span class="nav-text">
              <strong>지난 단가표</strong>
              <small>저장된 견적 이력</small>
            </span>
          </button>
          <button class="nav-item" data-view="sales">
            <span class="nav-icon">📈</span>
            <span class="nav-text">
              <strong>영업 현황</strong>
              <small>월별 발주 · 매출</small>
            </span>
          </button>
        </div>

        <div class="nav-section nav-section-data">
          <p class="nav-section-label">데이터 등록</p>
          <p class="nav-section-hint">메인 업무 전에 한 번만 설정하면 됩니다</p>
          <div class="nav-data-panel">
            <button class="nav-item nav-item-data" data-view="products">
              <span class="nav-icon">📦</span>
              <span class="nav-text">
                <strong>제품 등록</strong>
                <small>품목 · 기준 가격</small>
              </span>
            </button>
            <button class="nav-item nav-item-data" data-view="master" type="button" onclick="setView('master')">
              <span class="nav-icon">🌐</span>
              <span class="nav-text">
                <strong>거래처 통합 등록</strong>
                <small>국가 · 업체 · 거래조건</small>
              </span>
            </button>
          </div>
        </div>
      </nav>

      <div class="sidebar-help">
        <p><strong>입력 안내</strong></p>
        <p>노란 칸은 직접 입력, 연두 칸은 자동 계산됩니다.</p>
        <p class="app-version" id="app-version-label">버전 확인 중…</p>
      </div>
    </aside>

    <div class="sidebar-overlay" id="sidebar-overlay"></div>

    <div class="main">
      <header class="topbar">
        <div class="topbar-left">
          <button class="menu-toggle no-print" id="menu-toggle" aria-label="메뉴 열기">☰</button>
          <div class="topbar-nav no-print" id="topbar-nav">
            <button type="button" class="topbar-nav-btn" id="btn-nav-back" aria-label="뒤로가기" hidden>
              <span aria-hidden="true">←</span>
              <span class="topbar-nav-label">뒤로</span>
            </button>
            <button type="button" class="topbar-nav-btn topbar-nav-btn-home" id="btn-nav-home" aria-label="홈" hidden>
              <span aria-hidden="true">🏠</span>
              <span class="topbar-nav-label">홈</span>
            </button>
          </div>
          <div class="topbar-titles">
            <h2 id="page-title">홈</h2>
            <p id="page-desc">Barle 영업 관리 홈입니다.</p>
          </div>
        </div>
        <span class="topbar-brand no-print">Barle Cosmetics</span>
      </header>
      <div class="content" id="content"></div>
    </div>

    <div class="confirm-overlay" id="confirm-overlay" hidden>
      <div class="confirm-modal" role="dialog" aria-modal="true" aria-labelledby="confirm-title">
        <div class="confirm-header" id="confirm-header">
          <span class="confirm-icon" id="confirm-icon">⚠️</span>
          <div>
            <p class="confirm-label" id="confirm-label">삭제 확인</p>
            <h3 class="confirm-title" id="confirm-title">항목 삭제</h3>
          </div>
        </div>
        <div class="confirm-body">
          <ul class="confirm-details" id="confirm-details"></ul>
          <p class="confirm-warning" id="confirm-warning">삭제하면 되돌릴 수 없습니다.</p>
        </div>
        <div class="confirm-actions">
          <button type="button" class="btn btn-secondary btn-lg" id="confirm-cancel">취소</button>
          <button type="button" class="btn btn-lg" id="confirm-ok">삭제하기</button>
        </div>
      </div>
    </div>

    <div class="confirm-overlay" id="client-modal-overlay" hidden>
      <div class="confirm-modal client-modal" role="dialog" aria-modal="true" aria-labelledby="client-modal-title">
        <div class="confirm-header client-modal-header">
          <span class="confirm-icon">🏢</span>
          <div>
            <p class="confirm-label">신규 업체</p>
            <h3 class="confirm-title" id="client-modal-title">업체 등록</h3>
          </div>
        </div>
        <form id="quick-client-form" class="client-modal-body">
          <div class="form-group">
            <label>판매 국가 *</label>
            <select name="channelId" id="quick-client-channel" required></select>
          </div>
          <div class="form-group">
            <label>업체명 *</label>
            <input type="text" name="name" placeholder="예: 올리브영 본사, OO무역" required>
          </div>
          <div class="form-group">
            <label>담당자 / 연락처</label>
            <input type="text" name="contact" placeholder="홍길동 / 010-0000-0000">
          </div>
          <div class="form-group">
            <label>메모</label>
            <input type="text" name="memo" placeholder="비고 사항">
          </div>
          <div class="confirm-actions">
            <button type="button" class="btn btn-secondary btn-lg" id="client-modal-cancel">취소</button>
            <button type="submit" class="btn btn-primary btn-lg">등록하기</button>
          </div>
        </form>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.2/html2pdf.bundle.min.js"></script>
    <script src="js/data.js?v=59"></script>
    <script src="js/store.js?v=59"></script>
    <script src="js/poimport.js?v=59"></script>
    <script src="js/app.js?v=59"></script>
    <script src="js/proposal-pdf.js?v=59"></script>
    <script src="js/excel.js?v=59"></script>
  </body>
</html>
