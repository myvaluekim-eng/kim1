<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>바를 영업 관리</title>
    <script>
      (function () {
        var APP_BUILD = "2026-07-09-v8";
        var key = "barle-app-build";
        var saved = localStorage.getItem(key);
        if (saved !== APP_BUILD && location.search.indexOf("nocache=") === -1) {
          localStorage.setItem(key, APP_BUILD);
          location.replace(location.pathname + "?nocache=" + Date.now());
        }
      })();
    </script>
    <link rel="stylesheet" href="css/styles.css?v=8" />
  </head>
  <body>
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-logo">
        <div class="logo-mark">B</div>
        <div>
          <h1>바를 영업관리</h1>
          <span>Barle Cosmetics</span>
        </div>
      </div>

      <nav class="sidebar-nav">
        <div class="nav-section">
          <p class="nav-section-label">자주 쓰는 메뉴</p>
          <button class="nav-item active" data-view="dashboard">
            <span class="nav-icon">🏠</span>
            <span class="nav-text">
              <strong>시작하기</strong>
              <small>업무 선택 및 안내</small>
            </span>
          </button>
          <button class="nav-item" data-view="proposal">
            <span class="nav-icon">📋</span>
            <span class="nav-text">
              <strong>단가표 만들기</strong>
              <small>업체에 보낼 가격표 작성</small>
            </span>
          </button>
          <button class="nav-item" data-view="poupload">
            <span class="nav-icon">🧾</span>
            <span class="nav-text">
              <strong>발주서 등록</strong>
              <small>발주서 파일·이미지 업로드</small>
            </span>
          </button>
          <button class="nav-item" data-view="history">
            <span class="nav-icon">🕐</span>
            <span class="nav-text">
              <strong>지난 단가표</strong>
              <small>저장된 가격표 다시 보기</small>
            </span>
          </button>
          <button class="nav-item" data-view="sales">
            <span class="nav-icon">📈</span>
            <span class="nav-text">
              <strong>영업 현황</strong>
              <small>업체별·월별 발주 한눈에</small>
            </span>
          </button>
        </div>

        <div class="nav-section">
          <p class="nav-section-label">데이터 관리</p>
          <button class="nav-item" data-view="products">
            <span class="nav-icon">📦</span>
            <span class="nav-text">
              <strong>제품 등록</strong>
              <small>신규 제품 추가·삭제</small>
            </span>
          </button>
          <button class="nav-item" data-view="master">
            <span class="nav-icon">🌐</span>
            <span class="nav-text">
              <strong>거래처 통합 등록</strong>
              <small>채널·업체·거래조건 한번에</small>
            </span>
          </button>
          <button class="nav-item" data-view="srp">
            <span class="nav-icon">💰</span>
            <span class="nav-text">
              <strong>소비자가 설정</strong>
              <small>채널별 권장 소비자가</small>
            </span>
          </button>
        </div>
      </nav>

      <div class="sidebar-help">
        <p><strong>💡 도움말</strong></p>
        <p>노란 칸은 직접 입력, 파란 칸은 자동 계산됩니다.</p>
        <p class="app-version">버전 2026-07-09-v8</p>
      </div>
    </aside>

    <div class="sidebar-overlay" id="sidebar-overlay"></div>

    <div class="main">
      <header class="topbar">
        <div class="topbar-left">
          <button class="menu-toggle no-print" id="menu-toggle" aria-label="메뉴 열기">☰</button>
          <div>
            <h2 id="page-title">시작하기</h2>
            <p id="page-desc">업무를 선택하세요.</p>
          </div>
        </div>
        <span class="topbar-brand no-print">Barle Cosmetics</span>
      </header>
      <div class="content" id="content"></div>
    </div>

    <div class="confirm-overlay" id="confirm-overlay" hidden>
      <div class="confirm-modal" role="dialog" aria-modal="true" aria-labelledby="confirm-title">
        <div class="confirm-header" id="confirm-header">
          <span class="confirm-icon" id="confirm-icon">⚠️</span>
          <div>
            <p class="confirm-label" id="confirm-label">삭제 확인</p>
            <h3 class="confirm-title" id="confirm-title">항목 삭제</h3>
          </div>
        </div>
        <div class="confirm-body">
          <ul class="confirm-details" id="confirm-details"></ul>
          <p class="confirm-warning" id="confirm-warning">삭제하면 되돌릴 수 없습니다.</p>
        </div>
        <div class="confirm-actions">
          <button type="button" class="btn btn-secondary btn-lg" id="confirm-cancel">취소</button>
          <button type="button" class="btn btn-lg" id="confirm-ok">삭제하기</button>
        </div>
      </div>
    </div>

    <div class="confirm-overlay" id="client-modal-overlay" hidden>
      <div class="confirm-modal client-modal" role="dialog" aria-modal="true" aria-labelledby="client-modal-title">
        <div class="confirm-header client-modal-header">
          <span class="confirm-icon">🏢</span>
          <div>
            <p class="confirm-label">신규 업체</p>
            <h3 class="confirm-title" id="client-modal-title">업체 등록</h3>
          </div>
        </div>
        <form id="quick-client-form" class="client-modal-body">
          <div class="form-group">
            <label>판매 채널 *</label>
            <select name="channelId" id="quick-client-channel" required></select>
          </div>
          <div class="form-group">
            <label>업체명 *</label>
            <input type="text" name="name" placeholder="예: 올리브영 본사, OO무역" required>
          </div>
          <div class="form-group">
            <label>담당자 / 연락처</label>
            <input type="text" name="contact" placeholder="홍길동 / 010-0000-0000">
          </div>
          <div class="form-group">
            <label>메모</label>
            <input type="text" name="memo" placeholder="비고 사항">
          </div>
          <div class="confirm-actions">
            <button type="button" class="btn btn-secondary btn-lg" id="client-modal-cancel">취소</button>
            <button type="submit" class="btn btn-primary btn-lg">등록하기</button>
          </div>
        </form>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>
    <script src="js/data.js?v=8"></script>
    <script src="js/store.js?v=8"></script>
    <script src="js/excel.js?v=8"></script>
    <script src="js/poimport.js?v=8"></script>
    <script src="js/app.js?v=8"></script>
  </body>
</html>
